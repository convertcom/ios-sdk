# ConvertSwiftSDK — SwiftLint configuration
# Run: swiftlint (zero-warnings gate in CI)

included:
  - Sources
  - Tests
  - Demo  # Epic 7 SwiftUI demo app. The CI gate (`swiftlint lint --strict`, ci.yml) resolves
          # files from this list; adding Demo makes the zero-warnings gate genuinely cover every
          # demo Swift file (a force-unwrap in a later demo story fails CI, not just local checks).
          # The demo is otherwise inert to the SDK build (Package.swift has 0 Demo refs).

excluded:
  - Sources/ConvertSwiftSDKCore/Generated  # auto-generated, do not lint

disabled_rules:
  # Add suppressions here only with explicit justification
  - todo  # Scaffolding stories (Epic 1–7) ship mandated `// TODO: replaced by Story N+`
          # markers verbatim in placeholder stubs. The `todo` rule would flag every one of
          # them, and under the CI zero-warnings gate (`swiftlint --strict`, added in Story
          # 1.3) those warnings escalate to errors and break the build. Disabled SDK-wide so
          # the gate stays green; transient markers are removed as each stub is implemented.

opt_in_rules:
  - empty_count
  - explicit_init
  - force_unwrapping
