# ConvertSDK — SwiftLint configuration
# Run: swiftlint (zero-warnings gate in CI)

included:
  - Sources
  - Tests

excluded:
  - Sources/ConvertSDKCore/Generated  # auto-generated, do not lint

disabled_rules:
  # Add suppressions here only with explicit justification
  - todo  # Scaffolding stories (Epic 1–7) ship mandated `// TODO: replaced by Story N+`
          # markers verbatim in placeholder stubs. The `todo` rule would flag every one of
          # them, and under the CI zero-warnings gate (`swiftlint --strict`, added in Story
          # 1.3) those warnings escalate to errors and break the build. Disabled SDK-wide so
          # the gate stays green; transient markers are removed as each stub is implemented.

opt_in_rules:
  - empty_count
  - explicit_init
  - force_unwrapping
