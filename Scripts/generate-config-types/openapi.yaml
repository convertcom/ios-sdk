      allOf:
        - $ref: '#/components/schemas/ExperienceIntegrationBase'
    ExperienceIntegrationMouseflow:
      allOf:
        - $ref: '#/components/schemas/ExperienceIntegrationBase'
    ExperienceIntegrationPiwik:
