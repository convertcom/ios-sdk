        - $ref: '#/components/schemas/IntegrationGA4'
        - type: object
          properties:
            audiences:
              type: object
              description: >-
                List of GA audiences created for each of this experience's
                variations
              additionalProperties:
                type: string
                description: >-
                  Variation ID is the key, value is the ID of the audience
                  created inside GoogleAnalytics
    ExperienceIntegrationGoogleAnalytics:
