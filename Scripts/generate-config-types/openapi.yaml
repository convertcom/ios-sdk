          required:
            - custom_dimension
    ExperienceIntegrationCrazyegg:
      description: >
        Configuration for integrating with Crazy Egg. Convert sends experiment
        and variation data to allow segmentation of Crazy Egg heatmaps and
        recordings by variation.

        Project-level API key and secret for Crazy Egg might be required for
        some functionalities (not specified here, but in KB for other tools).

        KB: "Integrate Convert Experiences with Crazy Egg".
      allOf:
        - $ref: '#/components/schemas/ExperienceIntegrationBase'
    ExperienceIntegrationEconda:
      allOf:
        - $ref: '#/components/schemas/ExperienceIntegrationBase'
    ExperienceIntegrationEulerian:
      allOf:
        - $ref: '#/components/schemas/ExperienceIntegrationBase'
    ExperienceIntegrationGA3:
