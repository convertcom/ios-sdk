    TextMatchingOptions:
      type: string
      enum:
        - matches
        - regexMatches
        - contains
        - endsWith
        - startsWith
    CookieMatchingOptions:
      type: string
      enum:
        - matches
        - regexMatches
        - contains
        - endsWith
        - startsWith
        - exists
        - doesNotExist
    NumericMatchingOptions:
      type: string
      enum:
        - equalsNumber
        - less
        - lessEqual
    ChoiceMatchingOptions:
      type: string
      enum:
        - equals
    ChoiceContainsOptions:
      type: string
      enum:
        - contains
    SetMatchingOptions:
      type: string
      enum:
        - isIn
    RuleObject:
      type: object
      nullable: true
      description: >
        Defines the logical structure for combining multiple rule conditions. It
        uses a nested OR -> AND -> OR_WHEN structure.

        - The top-level `OR` array means if *any* of its contained AND blocks
        evaluate to true, the entire rule set is true.

        - Each object within the `OR` array has an `AND` array. For this AND
        block to be true, *all* of its contained OR_WHEN blocks must evaluate to
        true.

        - Each object within the `AND` array has an `OR_WHEN` array. For this
        OR_WHEN block to be true, *any* of its individual `RuleElement`
        conditions must evaluate to true.

        This structure allows for complex logical expressions like `(CondA AND
        CondB) OR (CondC AND CondD)`.
      properties:
        OR:
          description: >-
            An array of AND-blocks. The overall rule matches if any of these
            AND-blocks match.
          type: array
          items:
            type: object
            properties:
              AND:
                description: >-
                  An array of OR_WHEN-blocks. This AND-block matches if all its
                  OR_WHEN-blocks match.
                type: array
                items:
                  type: object
                  properties:
                    OR_WHEN:
                      description: >-
                        An array of individual rule elements. This OR_WHEN-block
                        matches if any of its rule elements match.
                      type: array
                      items:
                        $ref: '#/components/schemas/RuleElement'
    RuleObjectNoUrl:
      type: object
      nullable: true
      description: >
        Similar to `RuleObject`, but the individual `RuleElementNoUrl`
        conditions within `OR_WHEN` arrays cannot include URL-based matching
        types.

        Used for 'permanent' or 'transient' audiences where URL context is not
        persistently evaluated or relevant for the audience type.
      properties:
        OR:
          description: An array of AND-blocks.
          type: array
          items:
            type: object
            properties:
              AND:
                description: An array of OR_WHEN-blocks.
                type: array
                items:
                  type: object
                  properties:
                    OR_WHEN:
                      description: >-
                        An array of individual rule elements that do not involve
                        URL matching.
                      type: array
                      items:
                        $ref: '#/components/schemas/RuleElementNoUrl'
    RuleObjectAudience:
      type: object
      nullable: true
      description: >-
        This one describes a logical rule that is being used inside the app for
        triggering goals, matching audiences etc
      properties:
        OR:
          description: >-
            This describes an outer set of blocks which are evaluated using OR's
            between them
          type: array
          items:
            type: object
            properties:
              AND:
                description: >-
                  This describes a colections of logical blocks which are
                  evaluated using AND's between them
                type: array
                items:
                  type: object
                  properties:
                    OR_WHEN:
                      description: >-
                        This describes a colections of logical blocks which are
                        evaluated using OR's between them
                      type: array
                      items:
                        $ref: '#/components/schemas/RuleElementAudience'
    Base64Image:
      type: object
      properties:
        data:
          description: The base64 encoded string representation of the image's binary data.
          type: string
    ErrorData:
      type: object
      properties:
        code:
          type: integer
          format: int32
        message:
          type: string
        fields:
          type: string
    SuccessData:
      type: object
      properties:
        code:
          type: integer
          format: int32
        message:
          type: string
    ImportProjectDataSuccess:
      allOf:
        - $ref: '#/components/schemas/SuccessData'
        - type: object
          properties:
            imported:
              type: object
              description: List of imported objects
              properties:
                experiences:
                  type: array
                  description: List of created experiences. Empty if nothing imported
                  items:
                    type: integer
                audiences:
                  type: array
                  description: List of created audiences. Empty if nothing imported
                  items:
                    type: integer
                locations:
                  type: array
                  description: List of created locations. Empty if nothing imported
                  items:
                    type: integer
                goals:
                  type: array
                  description: List of created goals. Empty if nothing imported
                  items:
                    type: integer
                hypothesis:
                  type: array
                  description: List of created hypothesis. Empty if nothing imported
                  items:
                    type: integer
    BulkSuccessData:
      allOf:
        - $ref: '#/components/schemas/SuccessData'
        - type: object
          properties:
            code:
              type: integer
              format: int32
            errors:
              type: array
              description: >-
                List of unprocessed entities. Would be empty, if all passed
                entities processed
              items:
                $ref: '#/components/schemas/BulkEntityError'
    BulkEntityError:
      type: object
      additionalProperties: false
      properties:
        id:
          type: integer
          description: The unique identifier of the entity that could not be processed.
        message:
          type: string
          description: >-
            A message explaining the reason for the failure for this specific
            entity.
    UTC_Offset:
      type: integer
      description: 'Offset in seconds, from UTC time, for the give timezone'
      default: 0
      minimum: -43200
      maximum: 50400
    GA_SettingsBase:
      type: object
      properties:
        enabled:
          type: boolean
          description: >-
            If true, integration with Google Analytics is enabled for this
            project or experience, allowing experiment data to be sent to GA.
    IntegrationGA3:
      type: object
      properties:
        type:
          enum:
            - ga3
        property_UA:
          type: string
          maxLength: 150
          nullable: true
          description: >-
            The Universal Analytics Property ID (e.g., "UA-XXXXXXXX-Y") to which
            Convert experiment data will be sent.
    IntegrationGA4Base:
      type: object
      properties:
        type:
          enum:
            - ga4
        measurementId:
          type: string
          description: >-
            The GA4 Measurement ID (e.g., "G-XXXXXXXXXX") for the data stream
            where Convert experiment data will be sent.
    IntegrationGA4:
      allOf:
        - $ref: '#/components/schemas/IntegrationGA4Base'
        - type: object
          properties:
            propertyId:
              type: string
              description: >-
                ID of the ga4 property where data will be sent. Used internally
                for API calls to GoogleAnalytics
    GenericListMatchingOptions:
      type: string
      enum:
        - any
        - all
      description: >
        Defines how multiple conditions within a list (e.g., multiple audiences
        or locations linked to an experience) are logically combined:

        - `any`: The overall condition is met if *at least one* item in the list
        matches (logical OR).

        - `all`: The overall condition is met only if *all* items in the list
        match (logical AND).

        Default is typically 'any' (OR).
      default: any
    VisitorInsightsBase:
      type: object
      properties:
        enabled:
          type: boolean
          description: >
            If true, Convert Signals™ is enabled for the project, allowing the
            system to capture sessions exhibiting user frustration or usability
            issues.
        obfuscate_text:
          type: boolean
          default: false
          description: >
            True when all text elements (apart from placeholders) should be
            obfuscated inside a recording.
        sampling_rate:
          type: integer
          default: 5
          enum:
            - 5
            - 10
            - 20
            - 30
            - 40
            - 50
          description: >
            The percentage of visitors included in sampling for Convert Signals
            session recordings and Heatmaps for this project.

            Higher values collect data from a larger share of traffic and
            consume allocation faster.
        heatmap_visits_limit:
          type: integer
          default: 2500
          enum:
            - 2500
            - 5000
            - 10000
            - 15000
          description: >
            Maximum number of visits per variation used when generating a
            heatmap for this project.

            Applies to newly created heatmaps when an experience is activated.
    NumericOutlierTypes:
      description: >
        The method used for detecting and handling order outliers in revenue or
        product count tracking:

        - `none`: No outlier detection is applied.

        - `min_max`: Orders with values below a specified minimum or above a
        specified maximum are capped at those boundaries.

        - `percentile`: Orders falling below a lower percentile or above an
        upper percentile are capped at the values corresponding to those
        percentiles.
      type: string
      enum:
        - none
        - min_max
        - percentile
    NumericOutlierBase:
      type: object
      properties:
        detection_type:
          $ref: '#/components/schemas/NumericOutlierTypes'
      required:
        - detection_type
    NumericOutlierNone:
      allOf:
        - $ref: '#/components/schemas/NumericOutlierBase'
        - type: object
          additionalProperties: false
          properties:
            detection_type:
              enum:
                - none
    NumericOutlierMinMax:
      allOf:
        - $ref: '#/components/schemas/NumericOutlierBase'
        - type: object
          additionalProperties: false
          properties:
            detection_type:
              enum:
                - min_max
            min:
              type: number
              description: >-
                Minimum value for the outlier detection, under which, the value
                is considered an outlier
            max:
              type: number
              description: >-
                Maximum value for the outlier detection, over which, the value
                is considered an outlier
    NumericOutlierPercentile:
      allOf:
        - $ref: '#/components/schemas/NumericOutlierBase'
        - type: object
          additionalProperties: false
          properties:
            detection_type:
              enum:
                - percentile
            min:
              allOf:
                - description: >-
                    Minimum percentile value for the outlier detection; values
                    outside this percentile are considered outliers
                - $ref: '#/components/schemas/Percentiles'
            max:
              allOf:
                - description: >-
                    Maximum percentile value for the outlier detection; values
                    outside this percentile are considered outliers
                - $ref: '#/components/schemas/Percentiles'
    NumericOutlier:
      oneOf:
        - $ref: '#/components/schemas/NumericOutlierNone'
        - $ref: '#/components/schemas/NumericOutlierMinMax'
        - $ref: '#/components/schemas/NumericOutlierPercentile'
      discriminator:
        propertyName: detection_type
        mapping:
          none: '#/components/schemas/NumericOutlierNone'
          min_max: '#/components/schemas/NumericOutlierMinMax'
          percentile: '#/components/schemas/NumericOutlierPercentile'
    Percentiles:
      type: number
      description: >
        Standard percentile values used for outlier detection thresholds.

        For example, a `min` of 5 and `max` of 95 means orders in the bottom 5%
        and top 5% of values are considered outliers and capped.
      enum:
        - 1
        - 5
        - 10
        - 25
        - 50
        - 75
        - 90
        - 95
        - 99
    TimeRange:
      type: object
      properties:
        start_time:
          type: number
          nullable: true
          description: >-
            Unix timestamp (seconds since epoch, UTC) marking the beginning of
            the time range. If null, implies from the beginning of data.
        end_time:
          type: number
          nullable: true
          description: >-
            Unix timestamp (seconds since epoch, UTC) marking the end of the
            time range. If null, implies up to the current time.
        utc_offset:
          $ref: '#/components/schemas/UTC_Offset'
    UploadedFileData:
      type: object
      description: File Object
      additionalProperties: false
      properties:
        key:
          description: Storage key of the uploaded file.
          type: string
          maxLength: 500
        name:
          description: Original name of the uploaded file.
          type: string
          maxLength: 250
        url:
          description: Endpoint to access the file resource associated with the project.
          type: string
          readOnly: true
          example: >-
            https://api.convert.com/api/v2/accounts/{account_id}/projects/{project_id}/files/{fileKey}
    ConcurrencyKey:
      type: string
      nullable: true
      description: >-
        A server-generated hash that represents the object's state at the time
        of retrieval. When included in an update request, the operation will
        only succeed if the object hasn't been modified since this key was
        obtained. If another update has occurred in the meantime, the request
        will fail with a conflict error, requiring you to fetch the latest
        version and retry your update with the new concurrency_key. This
        implements optimistic concurrency control to prevent lost updates in
        concurrent scenarios.
    ConfigResponseData:
      type: object
      description: >-
        Response containing project's config data needed in order to serve
        experiences
      properties:
        account_id:
          type: string
          description: Account ID under which the project exists
        project:
          $ref: '#/components/schemas/ConfigProject'
        goals:
          description: List of goals to be tracked in the project
          type: array
          items:
            $ref: '#/components/schemas/ConfigGoal'
        locations:
          description: List of locations that are used inside this project
          type: array
          items:
            $ref: '#/components/schemas/ConfigLocation'
        audiences:
          description: List of audiences that are used inside this project
          type: array
          items:
            $ref: '#/components/schemas/ConfigAudience'
        segments:
          description: List of custom that are devined inside this project
          type: array
          items:
            $ref: '#/components/schemas/ConfigSegment'
        experiences:
          description: List of active experiences inside this project
          type: array
          items:
            $ref: '#/components/schemas/ConfigExperience'
        archived_experiences:
          description: >-
            List of archived experiences inside this project, which were
            archived within the last 8 months
          type: array
          items:
            type: string
            description: Experience ID
        features:
          description: >-
            List of features inside this project. Presented only for fullstack
            projects
          type: array
          items:
            $ref: '#/components/schemas/ConfigFeature'
        is_debug:
          type: boolean
          description: Flag indicating if the returned config is in debug mode
          default: false
    ConfigMinimalResponseData:
      allOf:
        - type: object
          description: >
            Limited data containing critical properties required for
            decision-making when assembling and 

            tracking various bundles (e.g., tracking scripts).
          properties:
            account_id:
              description: Account ID
              type: string
            project_id:
              description: Project ID
              type: string
        - $ref: '#/components/schemas/ConfigProjectMinimalSettings'
    ConfigOptionalResponseData:
      type: object
      description: >
        Limited data containing optional properties required for decision-making
        when assembling and 

        tracking various bundles (e.g., tracking scripts).
      properties:
        account_id:
          description: Account ID
          type: string
        project_id:
          description: Project ID
          type: string
        visitor_insights:
          $ref: '#/components/schemas/VisitorInsightsData'
    ExperienceChangeBase:
      description: >-
        The fundamental structure representing a single modification applied
        within an experience's variation. The specific content and behavior of
        the change are determined by its `type` and detailed in the `data`
        object.
      type: object
      properties:
        type:
          type: string
          enum:
            - richStructure
            - customCode
            - defaultCode
            - defaultCodeMultipage
            - defaultRedirect
            - fullStackFeature
        data:
          description: >
            A flexible object containing the specific details and content for
            this change, structured according to the change `type`.

            For example, for `customCode`, it would contain `js` and `css`
            strings. For `defaultRedirect`, it would contain `original_pattern`
            and `variation_pattern`.

            This field is included by default when fetching a single
            `ExperienceChange` but might be omitted in list views unless
            specified in an `include` parameter.
          type: object
    ExperienceChangeId:
      description: >-
        Represents the unique identifier of an existing change within an
        experience variation. Used when updating or referencing a specific
        change.
      type: object
      additionalProperties: false
      properties:
        id:
          description: The unique numerical identifier for this specific change.
          type: integer
      required:
        - id
    ExperienceChangeIdReadOnly:
      description: >-
        Represents the unique identifier of a change, typically when returned by
        the API after creation or in a list.
      type: object
      properties:
        id:
          description: The unique numerical identifier for this specific change.
          type: integer
          readOnly: true
    ExperienceChangeServing:
      description: Object that represents one change done inside an experience
      oneOf:
        - $ref: '#/components/schemas/ExperienceChangeDefaultCodeDataServing'
        - $ref: '#/components/schemas/ExperienceChangeDefaultCodeMultipageDataServing'
        - $ref: '#/components/schemas/ExperienceChangeDefaultRedirectDataServing'
        - $ref: '#/components/schemas/ExperienceChangeCustomCodeDataServing'
        - $ref: '#/components/schemas/ExperienceChangeRichStructureDataServing'
        - $ref: '#/components/schemas/ExperienceChangeFullStackFeatureServing'
      discriminator:
        propertyName: type
        mapping:
          defaultCode: '#/components/schemas/ExperienceChangeDefaultCodeDataServing'
          defaultCodeMultipage: '#/components/schemas/ExperienceChangeDefaultCodeMultipageDataServing'
          defaultRedirect: '#/components/schemas/ExperienceChangeDefaultRedirectDataServing'
          customCode: '#/components/schemas/ExperienceChangeCustomCodeDataServing'
          richStructure: '#/components/schemas/ExperienceChangeRichStructureDataServing'
          fullStackFeature: '#/components/schemas/ExperienceChangeFullStackFeatureServing'
    ExperienceChange:
      description: >-
        Represents a single, specific modification applied as part of an
        experience's variation. The exact structure and content depend on the
        `type` of change.
      oneOf:
        - $ref: '#/components/schemas/ExperienceChangeDefaultCodeData'
        - $ref: '#/components/schemas/ExperienceChangeDefaultCodeMultipageData'
        - $ref: '#/components/schemas/ExperienceChangeDefaultRedirectData'
        - $ref: '#/components/schemas/ExperienceChangeCustomCodeData'
        - $ref: '#/components/schemas/ExperienceChangeRichStructureData'
        - $ref: '#/components/schemas/ExperienceChangeFullStackFeature'
      discriminator:
        propertyName: type
        mapping:
          richStructure: '#/components/schemas/ExperienceChangeRichStructureData'
          customCode: '#/components/schemas/ExperienceChangeCustomCodeData'
          defaultCode: '#/components/schemas/ExperienceChangeDefaultCodeData'
          defaultCodeMultipage: '#/components/schemas/ExperienceChangeDefaultCodeMultipageData'
          defaultRedirect: '#/components/schemas/ExperienceChangeDefaultRedirectData'
          fullStackFeature: '#/components/schemas/ExperienceChangeFullStackFeature'
    ExperienceChangeAdd:
      description: >-
        Data structure for adding a new change to an experience variation. The
        `id` field is omitted as it will be assigned upon creation.
      oneOf:
        - $ref: '#/components/schemas/ExperienceChangeDefaultCodeDataAdd'
        - $ref: '#/components/schemas/ExperienceChangeDefaultCodeMultipageDataAdd'
        - $ref: '#/components/schemas/ExperienceChangeDefaultRedirectDataAdd'
        - $ref: '#/components/schemas/ExperienceChangeCustomCodeDataAdd'
        - $ref: '#/components/schemas/ExperienceChangeRichStructureDataAdd'
        - $ref: '#/components/schemas/ExperienceChangeFullStackFeatureAdd'
      discriminator:
        propertyName: type
        mapping:
          richStructure: '#/components/schemas/ExperienceChangeRichStructureDataAdd'
          customCode: '#/components/schemas/ExperienceChangeCustomCodeDataAdd'
          defaultCode: '#/components/schemas/ExperienceChangeDefaultCodeDataAdd'
          defaultCodeMultipage: '#/components/schemas/ExperienceChangeDefaultCodeMultipageDataAdd'
          defaultRedirect: '#/components/schemas/ExperienceChangeDefaultRedirectDataAdd'
          fullStackFeature: '#/components/schemas/ExperienceChangeFullStackFeatureAdd'
    ExperienceChangeUpdate:
      description: >-
        Data structure for updating an existing change within an experience
        variation. Requires the `id` of the change to be modified.
      oneOf:
        - $ref: '#/components/schemas/ExperienceChangeDefaultCodeDataUpdate'
        - $ref: '#/components/schemas/ExperienceChangeDefaultCodeMultipageDataUpdate'
        - $ref: '#/components/schemas/ExperienceChangeDefaultRedirectDataUpdate'
        - $ref: '#/components/schemas/ExperienceChangeRichStructureDataUpdate'
        - $ref: '#/components/schemas/ExperienceChangeCustomCodeDataUpdate'
        - $ref: '#/components/schemas/ExperienceChangeFullStackFeatureUpdate'
      discriminator:
        propertyName: type
        mapping:
          richStructure: '#/components/schemas/ExperienceChangeRichStructureDataUpdate'
          customCode: '#/components/schemas/ExperienceChangeCustomCodeDataUpdate'
          defaultCode: '#/components/schemas/ExperienceChangeDefaultCodeDataUpdate'
          defaultCodeMultipage: '#/components/schemas/ExperienceChangeDefaultCodeMultipageDataUpdate'
          defaultRedirect: '#/components/schemas/ExperienceChangeDefaultRedirectDataUpdate'
          fullStackFeature: '#/components/schemas/ExperienceChangeFullStackFeatureUpdate'
    ExperienceChangeUpdateNoId:
      description: >-
        Data structure for defining a change when updating a collection of
        changes (e.g., within a variation update), where the `id` might be part
        of a parent object or implied.
      oneOf:
        - $ref: '#/components/schemas/ExperienceChangeDefaultCodeDataUpdateNoId'
        - $ref: >-
            #/components/schemas/ExperienceChangeDefaultCodeMultipageDataUpdateNoId
        - $ref: '#/components/schemas/ExperienceChangeDefaultRedirectDataUpdateNoId'
        - $ref: '#/components/schemas/ExperienceChangeRichStructureDataUpdateNoId'
        - $ref: '#/components/schemas/ExperienceChangeCustomCodeDataUpdateNoId'
        - $ref: '#/components/schemas/ExperienceChangeFullStackFeatureUpdateNoId'
      discriminator:
        propertyName: type
        mapping:
          richStructure: '#/components/schemas/ExperienceChangeRichStructureDataUpdateNoId'
          customCode: '#/components/schemas/ExperienceChangeCustomCodeDataUpdateNoId'
          defaultCode: '#/components/schemas/ExperienceChangeDefaultCodeDataUpdateNoId'
          defaultCodeMultipage: >-
            #/components/schemas/ExperienceChangeDefaultCodeMultipageDataUpdateNoId
          defaultRedirect: '#/components/schemas/ExperienceChangeDefaultRedirectDataUpdateNoId'
          fullStackFeature: '#/components/schemas/ExperienceChangeFullStackFeatureUpdateNoId'
      x-mcp-exclude-field: true
    ExperienceChangeDefaultCodeDataBase:
      type: object
      description: >-
        Defines a standard code-based change, typically generated by the Visual
        Editor for modifications like text replacement, style changes, or
        element removal. It can include CSS, Convert's internal JS
        representation, and custom JS.
      allOf:
        - $ref: '#/components/schemas/ExperienceChangeBase'
        - type: object
          properties:
            type:
              enum:
                - defaultCode
            data:
              type: object
              description: Describes structure for "defaultCode" type of experience change
              additionalProperties: false
              properties:
                css:
                  type: string
                  nullable: true
                  description: CSS code to be applied by this change
                js:
                  type: string
                  nullable: true
                  description: >-
                    Javascript code generated by the visual editor or written in
                    the same structure, to be applied by this experience change
                custom_js:
                  type: string
                  description: Custom javascript code to be applied by this change
                  nullable: true
    ExperienceChangeDefaultCodeData:
      type: object
      description: >-
        Represents a 'defaultCode' type change, including its system-assigned
        ID.
      allOf:
        - $ref: '#/components/schemas/ExperienceChangeIdReadOnly'
        - $ref: '#/components/schemas/ExperienceChangeDefaultCodeDataBase'
        - type: object
          properties:
            concurrency_key:
              $ref: '#/components/schemas/ConcurrencyKey'
    ExperienceChangeDefaultCodeDataServing:
      type: object
      description: Describes structure for "defaultCode" type of experience change
      allOf:
        - $ref: '#/components/schemas/ExperienceChangeIdReadOnly'
        - $ref: '#/components/schemas/ExperienceChangeDefaultCodeDataBase'
    ExperienceChangeDefaultCodeDataAdd:
      type: object
      description: Data for creating a new 'defaultCode' type change.
      allOf:
        - $ref: '#/components/schemas/ExperienceChangeIdReadOnly'
        - $ref: '#/components/schemas/ExperienceChangeDefaultCodeDataBase'
        - properties:
            data:
              required:
                - js
                - css
                - custom_js
          required:
            - type
            - data
    ExperienceChangeDefaultCodeDataUpdateNoId:
      type: object
      description: >-
        Data for updating a 'defaultCode' type change when its ID is managed
        externally.
      allOf:
        - $ref: '#/components/schemas/ExperienceChangeDefaultCodeDataBase'
        - type: object
          properties:
            concurrency_key:
              $ref: '#/components/schemas/ConcurrencyKey'
        - required:
            - type
            - data
      x-mcp-exclude-field: true
    ExperienceChangeDefaultCodeDataUpdate:
      type: object
      description: >-
        Data for updating an existing 'defaultCode' type change, identified by
        its `id`.
      allOf:
        - $ref: '#/components/schemas/ExperienceChangeId'
        - $ref: '#/components/schemas/ExperienceChangeDefaultCodeDataBase'
        - type: object
          properties:
            concurrency_key:
              $ref: '#/components/schemas/ConcurrencyKey'
        - required:
            - type
            - data
    ExperienceChangeDefaultRedirectDataBase:
      type: object
      description: >-
        Defines a URL redirect, typically used in Split URL experiments. It
        specifies how to match an original URL and construct the URL for the
        variation page.
      allOf:
        - $ref: '#/components/schemas/ExperienceChangeBase'
        - type: object
          properties:
            type:
              enum:
                - defaultRedirect
            data:
              type: object
              description: >-
                Describes structure for "defaultRedirect" type of experience
                change
              additionalProperties: false
              properties:
                case_sensitive:
                  type: boolean
                  description: Defines whether the URL matching is case sensitive or not
                original_pattern:
                  type: string
                  description: >-
                    Pattern for matching the Original URL in order to construct
                    the redirect URL
                variation_pattern:
                  type: string
                  description: >-
                    String used to construct the variation redirect URL. This
                    string can contain matches from original_url or it can be a
                    standard URL
    ExperienceChangeDefaultRedirectData:
      type: object
      description: >-
        Represents a 'defaultRedirect' type change, including its
        system-assigned ID.
      allOf:
        - $ref: '#/components/schemas/ExperienceChangeIdReadOnly'
        - $ref: '#/components/schemas/ExperienceChangeDefaultRedirectDataBase'
        - type: object
          properties:
            concurrency_key:
              $ref: '#/components/schemas/ConcurrencyKey'
    ExperienceChangeDefaultRedirectDataServing:
      type: object
      description: Describes structure for "defaultRedirect" type of experience change
      allOf:
        - $ref: '#/components/schemas/ExperienceChangeIdReadOnly'
        - $ref: '#/components/schemas/ExperienceChangeDefaultRedirectDataBase'
    ExperienceChangeDefaultRedirectDataAdd:
      type: object
      description: Data for creating a new 'defaultRedirect' type change.
      allOf:
        - $ref: '#/components/schemas/ExperienceChangeIdReadOnly'
        - $ref: '#/components/schemas/ExperienceChangeDefaultRedirectDataBase'
        - properties:
            data:
              required:
                - original_pattern
                - variation_pattern
          required:
            - type
            - data
      x-mcp-exclude-field: true
    ExperienceChangeDefaultRedirectDataUpdateNoId:
      type: object
      description: >-
        Data for updating a 'defaultRedirect' type change when its ID is managed
        externally.
      allOf:
        - $ref: '#/components/schemas/ExperienceChangeDefaultRedirectDataBase'
        - type: object
          properties:
            concurrency_key:
              $ref: '#/components/schemas/ConcurrencyKey'
        - required:
            - type
            - data
      x-mcp-exclude-field: true
    ExperienceChangeDefaultRedirectDataUpdate:
      type: object
      description: >-
        Data for updating an existing 'defaultRedirect' type change, identified
        by its `id`.
      allOf:
        - $ref: '#/components/schemas/ExperienceChangeId'
        - $ref: '#/components/schemas/ExperienceChangeDefaultRedirectDataBase'
        - type: object
          properties:
            concurrency_key:
              $ref: '#/components/schemas/ConcurrencyKey'
