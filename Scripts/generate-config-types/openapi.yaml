    IntegrationProvider:
      type: string
      description: >
        Identifies the third-party analytics, heatmap, or data platform with
        which Convert Experiences is integrated for this specific experience.

        This allows experiment data (like experience ID and variation ID/name)
        to be sent to the selected provider.

        Knowledge Base has many articles on integrations, e.g., "Integrate
        Convert Experiences with Google Analytics", "Hotjar Integration".
      enum:
        - baidu
        - clicktale
        - clicky
        - cnzz
        - crazyegg
        - econda
        - eulerian
        - google_analytics
        - gosquared
        - heapanalytics
        - hotjar
        - microsoft_clarity
        - mixpanel
        - mouseflow
        - piwik
        - segmentio
        - sitecatalyst
        - woopra
        - ysance
    ExperienceIntegrationBase:
      type: object
      properties:
        provider:
          $ref: '#/components/schemas/IntegrationProvider'
        enabled:
          description: >
            If `true`, this integration is active for the experience, and
            Convert will attempt to send experiment data to the specified
            provider.

            If `false` or omitted when updating, the integration is disabled.
          type: boolean
          nullable: true
      required:
        - provider
    ExperienceIntegrationBaidu:
      allOf:
        - $ref: '#/components/schemas/ExperienceIntegrationBase'
        - type: object
          properties:
            custom_dimension:
              type: string
              description: Custom dimension where experience data should be sent to.
          required:
            - custom_dimension
    ExperienceIntegrationClicktale:
      allOf:
        - $ref: '#/components/schemas/ExperienceIntegrationBase'
    ExperienceIntegrationClicky:
      allOf:
        - $ref: '#/components/schemas/ExperienceIntegrationBase'
    ExperienceIntegrationCnzz:
      allOf:
        - $ref: '#/components/schemas/ExperienceIntegrationBase'
        - type: object
          properties:
            custom_dimension:
              type: string
