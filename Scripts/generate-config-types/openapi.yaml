          required:
            - custom_dimension
    ConfigExperience:
      type: object
      properties:
        id:
          description: Experience ID
          type: string
        name:
          description: Experience Name
          type: string
        key:
          description: Experience readable key that uniquely identifies this experience
          type: string
        locations:
          description: >-
            List of locations IDs on which this experience is presented. Either
            this or **site_area** is given but should not be both.
          type: array
          nullable: true
          items:
            type: string
        site_area:
          description: >-
            Rules that define where the experience is gonna run. Either this or
            **locations** is given but should not be both.
          nullable: true
          allOf:
            - $ref: '#/components/schemas/RuleObject'
        audiences:
          description: List of audiences IDs to which this experience is presented to
          type: array
          nullable: true
          items:
            type: string
        goals:
          description: List of goals IDs to which will be tracked for this experience
          type: array
          items:
            type: string
        multipage_pages:
          type: array
          description: Only for multipage experience type
          items:
            $ref: '#/components/schemas/MultipageExperiencePage'
        status:
          $ref: '#/components/schemas/ExperienceStatuses'
        global_js:
          description: >
            Global Experience's JavaScript that will run for this experience
            before its changes are applied
          type: string
        global_css:
          description: >
            Global Experience's StyleSheet that will run for this experience
            before its changes are applied
          type: string
        type:
          $ref: '#/components/schemas/ExperienceTypes'
        version:
          description: Experience's version number
          type: number
        variations:
          description: Experience's variations list
          type: array
          items:
            $ref: '#/components/schemas/ExperienceVariationConfig'
        integrations:
          type: array
          description: List of integrations that this experience's data is sent to
          items:
            anyOf:
              - $ref: '#/components/schemas/ExperienceIntegrationBaidu'
              - $ref: '#/components/schemas/ExperienceIntegrationClicktale'
              - $ref: '#/components/schemas/ExperienceIntegrationClicky'
              - $ref: '#/components/schemas/ExperienceIntegrationCnzz'
              - $ref: '#/components/schemas/ExperienceIntegrationCrazyegg'
              - $ref: '#/components/schemas/ExperienceIntegrationEconda'
              - $ref: '#/components/schemas/ExperienceIntegrationEulerian'
              - $ref: '#/components/schemas/ExperienceIntegrationGAServing'
              - $ref: '#/components/schemas/ExperienceIntegrationGosquared'
              - $ref: '#/components/schemas/ExperienceIntegrationHeapanalytics'
              - $ref: '#/components/schemas/ExperienceIntegrationHotjar'
              - $ref: '#/components/schemas/ExperienceIntegrationMixpanel'
              - $ref: '#/components/schemas/ExperienceIntegrationMouseflow'
              - $ref: '#/components/schemas/ExperienceIntegrationPiwik'
              - $ref: '#/components/schemas/ExperienceIntegrationSegmentio'
              - $ref: '#/components/schemas/ExperienceIntegrationSitecatalyst'
              - $ref: '#/components/schemas/ExperienceIntegrationWoopra'
              - $ref: '#/components/schemas/ExperienceIntegrationYsance'
        environments:
          type: array
          deprecated: true
          description: >
            List of environments that this experience is supposed to run on. The
            full list of available environments is defined at 

            project level. If this list is empty, the experience will run on all
            environments.
          items:
            type: string
        environment:
          type: string
          description: >-
            The environment where this experience will run. It has to be one of
            the environments defined at the project level
        settings:
          description: Various experience's settings
          type: object
          properties:
            min_order_value:
              description: Minimum order value for transactions outliers
              type: number
              minimum: 0
              deprecated: true
            max_order_value:
              description: Maximum order value for transactions outliers
              type: number
              minimum: 0
              deprecated: true
            outliers:
              description: Various settings used by the stats engine to detect outliers
              type: object
              properties:
                order_value:
                  description: Order value outlier settings
                  allOf:
                    - $ref: '#/components/schemas/NumericOutlier'
                products_ordered_count:
                  description: Products Ordered count outlier settings
                  allOf:
                    - $ref: '#/components/schemas/NumericOutlier'
            placeholders:
              type: array
              description: >-
                List of placeholders used by this experience (from changes,
                global_js, and global_css)
              items:
                type: string
                description: Placeholder key
              example:
                - first_name
                - email
            split_url_settings:
              type: object
              description: A couple of settings only applicable to Split URL experiments
              properties:
                split_regex_support:
                  type: boolean
                  description: >
                    Whether regular expressions are supported in
                    original/variation URLs of a split URL experiment or not.


                    It only applies to **experience_type** -
                    **split_url**       
            matching_options:
              type: object
              description: >-
                Various settings used for matching the list of Audiences and
                Locations
              properties:
                audiences:
                  $ref: '#/components/schemas/GenericListMatchingOptions'
                locations:
                  $ref: '#/components/schemas/GenericListMatchingOptions'
    MultipageExperiencePage:
      description: Multipage Experience Page object
      allOf:
        - type: object
          properties:
            id:
              description: The ID of the page.
              type: string
              minLength: 1
              maxLength: 2
              pattern: '^[0-9a-z]{1,2}$'
            name:
              description: Name of the page
              type: string
              maxLength: 200
            url:
              description: The url of page to load
              type: string
              maxLength: 2048
          additionalProperties: false
    ExperienceVariationConfig:
      type: object
      description: Variation Object
      properties:
        id:
          description: Variation ID
          type: string
        name:
          description: Variation name
          type: string
        key:
          description: Variation Key
          type: string
        traffic_allocation:
          description: >
            Percentage of traffic allocation for this variation, as a number
            from 0 to 10000.

            For an experience, the sum of the traffic allocations for all
            variations cannot be greater than 10000.
          type: number
          minimum: 0
          maximum: 10000
        status:
          $ref: '#/components/schemas/VariationStatuses'
        changes:
          description: List of changes that this variation is exposing.
          type: array
          items:
            $ref: '#/components/schemas/ExperienceChangeServing'
    ExperienceStatuses:
      type: string
      enum:
        - draft
        - active
        - paused
        - completed
        - scheduled
    ExperienceTypes:
      type: string
      enum:
        - a/b
        - a/a
        - mvt
        - split_url
        - multipage
        - deploy
        - a/b_fullstack
        - feature_rollout
    VariationStatuses:
      type: string
      description: Variation status
      enum:
        - stopped
        - running
    ExperienceIntegrationGAServing:
      oneOf:
        - $ref: '#/components/schemas/ExperienceIntegrationGA3'
        - $ref: '#/components/schemas/ExperienceIntegrationGA4Base'
      discriminator:
        propertyName: type
        mapping:
          ga3: '#/components/schemas/ExperienceIntegrationGA3'
          ga4: '#/components/schemas/ExperienceIntegrationGA4Base'
    ConfigFeature:
      type: object
      description: Base Feature Object
      properties:
        id:
          description: Feature ID
          type: string
        name:
          description: A name given to the feature to identify it easily
          type: string
        key:
          description: A unique per project level identifier
          type: string
        variables:
          type: array
          description: An array of user-defined variables of a feature.
          items:
            $ref: '#/components/schemas/FeatureVariableItemData'
    FeatureVariableItemData:
      type: object
