openapi: 3.0.3
info:
  title: Convert API for Experiences Serving
  description: |
    Serve and track experiences to your users using Convert APIs and tools
  version: 1.1.0
x-tagGroups:
  - name: Client Authentication
    tags:
      - SDK Key Authentication
      - Debug Token
  - name: Configs
    tags:
      - Project Config
  - name: Visitor Data
    tags:
      - Visitor Data
  - name: Tracking
    tags:
      - Experiences Tracking
tags:
  - name: Project Config
    description: >
      Api endpoint which returns all the configuration of one project inside an
      account. 

      This can be consumed inside various fullstack sdks
  - name: Visitor Data
    description: >
      Api endpoint which returns the visitor data of one project inside an
      account. 

      This can be consumed inside various fullstack sdks
  - name: Experiences Tracking
    description: >
      Endpoint which allows tracking events to be sending to Convert's tracking
      backend
  - name: SDK Key Authentication
    description: >
      In order to authenticate requests to the Convert Tracking/Config
      API/Visitor Data API, you need to provide the SDK key secret inside the
      `Authorization` header. 


      Note: 
        * For the Projects that have `settings.disable_default_config=true` , **access will work only through the use of SDK Key Authentication** method with the associated endpoints.
        * For the Projects that have `settings.disable_default_config=false` , access will work through the use of SDK Key Authentication method with 
          the associated endpoints or without authentication, through the default endpoints.
        * An **SDK key could have a secret associated or not**. If it has a secret, it should be provided in the `Authorization` header. 
          If it doesn't have a secret, the `Authorization` header should be empty and the request would be authorized if the provided SDK key is found.
  - name: Debug Token
    description: >
      In order to return also the **draft** and **paused** experiences into the
      Convert Tracking/Config API, you need to provide the Debug Token 

      inside the `convert-debug-token` header in the form of
      `convert-debug-token: <debug_token>`. The token is a short lived one with
      a default expiration 

      of 24 hours and can be obtained/renewed by calling **[Generate Debug
      Token](/doc/v2/#tag/Projects/operation/generateDebugToken)** REST api
      endpoint.
security: []
paths:
  '/config/{account_id}/{project_id}':
    get:
      operationId: getProjectConfig
      summary: Default Get Project Config
      description: >-
        This is the default endpoint that does not need SDK Keys to returns the
        project's config to be consumed in various sdks
      tags:
        - Project Config
      parameters:
        - name: account_id
          in: path
          required: true
          description: ID of the account that owns the retrieved/saved data
          schema:
            type: integer
        - name: project_id
          in: path
          required: true
          description: ID of the project to be retrieved
          schema:
            type: integer
        - name: environment
          in: query
          description: Filter experiences based on environment.
          schema:
            type: string
      responses:
        '200':
          $ref: '#/components/responses/ProjectConfigResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'
    servers:
      - url: 'https://cdn-4.convertexperiments.com/api/v1'
        description: Live API server for **Configs** endpoints
      - url: 'https://cdn-provider-dev.convertexperiments.com/api/v1'
        description: Live API server for **Configs** endpoints
  '/config/{sdk_key}':
    get:
      operationId: getProjectConfigBySdkKey
      summary: Sdk-Key Get Project Config
      description: >-
        This endpoint returns the project's config to be consumed in various
        sdks using the SDK Key
      tags:
        - Project Config
      parameters:
        - name: sdk_key
          in: path
          required: true
          description: The SDK key used to retrieve the project's config
          schema:
            type: string
        - name: environment
          in: query
          description: Filter experiences based on environment.
          schema:
            type: string
      security:
        - sdkKeyAuth: []
        - debuggingTokenAuth: []
      responses:
        '200':
          $ref: '#/components/responses/ProjectConfigResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'
    servers:
      - url: 'https://cdn-4.convertexperiments.com/api/v1'
        description: Live API server for **Configs** endpoints
      - url: 'https://cdn-provider-dev.convertexperiments.com/api/v1'
        description: Live API server for **Configs** endpoints
  '/project-settings/{account_id}/{project_id}':
    get:
      operationId: getProjectSettings
      summary: Minimal Project Settings
      description: >-
        Returns a basic set of properties for the currently given config
        endpoing
      tags:
        - Project Config
      parameters:
        - name: account_id
          in: path
          required: true
          description: ID of the account that owns the retrieved/saved data
          schema:
            type: integer
        - name: project_id
          in: path
          required: true
          description: ID of the project to be retrieved
          schema:
            type: integer
      responses:
        '200':
          $ref: '#/components/responses/ProjectConfigMinimalResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'
    servers:
      - url: 'https://cdn-4.convertexperiments.com/api/v1'
        description: Live API server for **Configs** endpoints
      - url: 'https://cdn-provider-dev.convertexperiments.com/api/v1'
        description: Live API server for **Configs** endpoints
  '/project-optional-settings/{account_id}/{project_id}':
    get:
      operationId: getProjectOptionalSettings
      summary: Optional Project Settings
      description: >-
        Returns a basic set of optional project's settings for the currently
        given config endpoint
      tags:
        - Project Config
      parameters:
        - name: account_id
          in: path
          required: true
          description: ID of the account that owns the retrieved/saved data
          schema:
            type: integer
        - name: project_id
          in: path
          required: true
          description: ID of the project to be retrieved
          schema:
            type: integer
      responses:
        '200':
          $ref: '#/components/responses/ProjectConfigOptionalResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'
    servers:
      - url: 'https://cdn-4.convertexperiments.com/api/v1'
        description: Live API server for **Configs** endpoints
      - url: 'https://cdn-provider-dev.convertexperiments.com/api/v1'
        description: Live API server for **Configs** endpoints
  '/track/{sdk_key}':
    post:
      operationId: sendTrackingEventsSdkKey
      summary: Sdk-Key Send Tracking
      description: >-
        This endpoint allows sending of tracking events to the Convert tracking
        server via SDK Key authentication
      tags:
        - Experiences Tracking
      parameters:
        - name: sdk_key
          in: path
          required: true
          description: >-
            The SDK key used to identify the project where that the data belongs
            to
          schema:
            type: string
      security:
        - sdkKeyAuth: []
        - debuggingTokenAuth: []
      requestBody:
        $ref: '#/components/requestBodies/SendTrackingEventsRequest'
      responses:
        '200':
          $ref: '#/components/responses/SuccessResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'
    servers:
      - url: 'https://metrics.convertexperiments.com/v1'
        description: Live API server for **Tracking** endpoints
      - url: 'http://trackdev.convert.com:1515/v1'
        description: Dev API server for **Tracking** endpoints
  '/track/{account_id}/{project_id}':
    post:
      operationId: sendTrackingEvents
      summary: Send Tracking
      description: >-
        This endpoint allows sending of tracking events to the Convert tracking
        server
      tags:
        - Experiences Tracking
      parameters:
        - name: account_id
          in: path
          required: true
          description: ID of the account that owns the given project
          schema:
            type: integer
        - name: project_id
          in: path
          required: true
          description: ID of the project to which the events belong to
          schema:
            type: integer
      requestBody:
        $ref: '#/components/requestBodies/SendTrackingEventsRequest'
      responses:
        '200':
          $ref: '#/components/responses/SuccessResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'
    servers:
      - url: 'https://metrics.convertexperiments.com/v1'
        description: Live API server for **Tracking** endpoints
      - url: 'http://trackdev.convert.com:1515/v1'
        description: Dev API server for **Tracking** endpoints
  '/visitor-data/{account_id}/{project_id}/{visitor_id}':
    get:
      operationId: getVisitorData
      summary: Get Visitor Data
      description: >-
        This is the default endpoint that does not need SDK Keys to returns the
        project's visitor data.
      tags:
        - Visitor Data
      parameters:
        - name: account_id
          in: path
          required: true
          description: ID of the account that owns the retrieved/saved data
          schema:
            type: integer
        - name: project_id
          in: path
          required: true
          description: ID of the project to be retrieved
          schema:
            type: integer
        - name: visitor_id
          in: query
          description: ID of the visitor to be retrieved
          required: true
          schema:
            type: string
      responses:
        '200':
          $ref: '#/components/responses/ProjectVisitorDataResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'
    servers:
      - url: 'https://cdn-4.convertexperiments.com/api/v1'
        description: Live API server for **Visitor Data** endpoints
      - url: 'https://cdn-provider-dev.convertexperiments.com/api/v1'
        description: Live API server for **Visitor Data** endpoints
  '/visitor-data/{sdk_key}/{visitor_id}':
    get:
      operationId: getVisitorDataBySdkKey
      summary: Sdk-Key Get Visitor Data
      description: >-
        This endpoint returns the project's visitor data to be consumed in
        various sdks using the SDK Key
      tags:
        - Visitor Data
      parameters:
        - name: sdk_key
          in: path
          required: true
          description: The SDK key used to retrieve the project's visitor data
          schema:
            type: string
        - name: visitor_id
          in: query
          description: ID of the visitor to be retrieved
          required: true
          schema:
            type: string
      security:
        - sdkKeyAuth: []
        - debuggingTokenAuth: []
      responses:
        '200':
          $ref: '#/components/responses/ProjectVisitorDataResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'
    servers:
      - url: 'https://cdn-4.convertexperiments.com/api/v1'
        description: Live API server for **Visitor Data** endpoints
      - url: 'https://cdn-provider-dev.convertexperiments.com/api/v1'
        description: Live API server for **Visitor Data** endpoints
components:
  securitySchemes:
    sdkKeyAuth:
      type: apiKey
      name: Authorization
      in: header
      description: >
        See **[API Key Authentication](#tag/SDK-Key-Authentication)** for more
        information.
    debuggingTokenAuth:
      type: apiKey
      name: convert-debug-token
      in: header
      description: |
        See **[Debug Token](#tag/Debug-Token)** for more information.
  requestBodies:
    SendTrackingEventsRequest:
      required: true
      description: >-
        A JSON object containing the tracking events sent to the Convert
        tracking servers.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/SendTrackingEventsRequestData'
  responses:
    ProjectConfigResponse:
      description: |
        Object consumed by SDKs
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ConfigResponseData'
    ProjectConfigMinimalResponse:
      description: |
        Object consumed by SDKs
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ConfigMinimalResponseData'
    ProjectConfigOptionalResponse:
      description: |
        Object consumed by SDKs
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ConfigOptionalResponseData'
    ErrorResponse:
      description: A response signaling an error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorData'
    SuccessResponse:
      description: A response signaling a generic success
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/SuccessData'
    ProjectVisitorDataResponse:
      description: |
        Object consumed by SDKs
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/VisitorDataResponseData'
  schemas:
    ConfigAudience:
      description: Base Audience object
      type: object
      properties:
        id:
          type: string
          description: Audience ID
        key:
          description: Audience unique key
          type: string
        name:
          type: string
          description: Audience Name
        type:
          $ref: '#/components/schemas/ConfigAudienceTypes'
        rules:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/RuleObjectAudience'
    ConfigAudienceTypes:
      description: >
        Type of the Audience. Can be one of the following: `permanent`,
        `transient`. For full-stack projects, `transient` is the only valid
        option, the rest will be ignored.

        * **permanent** - A permanent audience is one that is checked only at
        the time the user is being bucketed into the experience

        * **transient** - A transient audience is one that is checked every time
        the user is being bucketed into the experience
      type: string
      enum:
        - permanent
        - transient
    PageNumber:
      type: object
      properties:
        page:
          type: integer
          minimum: 1
          description: >
            The page number for paginated results. For example, if
            `results_per_page` is 30, `page: 2` will retrieve items 31-60.

            Defaults to 1 if not specified.
    Pagination:
      type: object
      properties:
        current_page:
          description: The current page number being displayed from the paginated set.
          type: integer
          minimum: 1
        items_count:
          description: >-
            The total number of items available across all pages for the current
            filter criteria.
          type: integer
          minimum: 0
        items_per_page:
          description: >-
            The number of items included in the current page of results (matches
            `results_per_page` from the request).
          type: integer
          minimum: 0
        pages_count:
          description: >-
            The total number of pages available for the current filter criteria
            and `results_per_page` setting.
          type: integer
          minimum: 0
      x-mcp-exclude-field: true
    ResultsPerPage:
      type: object
      properties:
        results_per_page:
          type: integer
          nullable: true
          minimum: 0
          maximum: 50
          default: 30
          description: >
            Specifies the maximum number of items to return in a single page of
            results.

            Used for pagination. Default is 30, maximum is 50.
    SortDirection:
      type: object
      properties:
        sort_direction:
          type: string
          nullable: true
          default: desc
          description: >
            The direction for sorting the list results, based on the `sort_by`
            field.

            - `asc`: Ascending order (e.g., A-Z, 1-10, oldest to newest).

            - `desc`: Descending order (e.g., Z-A, 10-1, newest to oldest).

            Defaults to `desc` (newest/highest first) if not specified.
          enum:
            - asc
            - desc
    OnlyCount:
      type: object
      properties:
        onlyCount:
          type: boolean
          description: >
            If set to `true` in a list request, the response will only contain
            the total count of matching items (`extra.pagination.items_count`)

            and will not include the actual item data. Useful for quickly
            getting totals without fetching full datasets.
    Extra:
      type: object
      properties:
        pagination:
          $ref: '#/components/schemas/Pagination'
      x-mcp-exclude-field: true
    BaseRule:
      type: object
      required:
        - rule_type
      properties:
        rule_type:
          description: >
            The specific attribute or condition to evaluate. Examples: 'url',
            'cookie', 'browser_name', 'js_condition', 'page_tag_product_price'.

            The allowed `rule_type` values depend on whether the rule is for an
            Audience (which can use visitor and page content attributes if it's
            a 'segmentation' type) or a Location (typically URL or page tag
            based).
          type: string
    BaseRuleWithStringValue:
      allOf:
        - $ref: '#/components/schemas/BaseRule'
        - type: object
          properties:
            value:
              description: The value used to match against 'rule_type' using 'matching'
              type: string
    BaseRuleWithJsCodeValue:
      allOf:
        - $ref: '#/components/schemas/BaseRule'
        - type: object
          properties:
            value:
              description: >
                The JS code that would be executed when rule is checked. The
                return value of this JS code is what is gonna be matched


                against **true**(or **false** if **matching.negated = true** is
                provided)
              type: string
    BaseRuleWithBooleanValue:
      allOf:
        - $ref: '#/components/schemas/BaseRule'
        - type: object
          properties:
            value:
              description: The value used to match against 'rule_type' using 'matching'
              type: boolean
    BaseRuleWithNumericValue:
      allOf:
        - $ref: '#/components/schemas/BaseRule'
        - type: object
          properties:
            value:
              description: The value used to match against 'rule_type' using 'matching'
              type: number
    BaseRuleWithCountryCodeValue:
      allOf:
        - $ref: '#/components/schemas/BaseRule'
        - type: object
          properties:
            value:
              description: The 2 letter ISO country code used for matching
              type: string
              minLength: 2
              maxLength: 2
    BaseRuleWithLanguageCodeValue:
      allOf:
        - $ref: '#/components/schemas/BaseRule'
        - type: object
          properties:
            value:
              description: The 2 letter ISO language code used for matching
              type: string
              minLength: 2
              maxLength: 2
    BaseRuleWithGoalTriggeredValue:
      allOf:
        - $ref: '#/components/schemas/BaseRule'
        - type: object
          properties:
            value:
              description: ID of the goal used for matching
              type: number
    BaseRuleWithVisitorTypeValue:
      allOf:
        - $ref: '#/components/schemas/BaseRule'
        - type: object
          properties:
            value:
              description: Type of the visitors
              type: string
              enum:
                - new
                - returning
    BaseRuleWithExperienceBucketedValue:
      allOf:
        - $ref: '#/components/schemas/BaseRule'
        - type: object
          properties:
            value:
              description: ID of the experience used for matching
              type: number
    BaseRuleWithSegmentBucketedValue:
      allOf:
        - $ref: '#/components/schemas/BaseRule'
        - type: object
          properties:
            value:
              description: ID of the segment used for matching
              type: number
    BaseRuleWithDayOfWeekValue:
      allOf:
        - $ref: '#/components/schemas/BaseRule'
        - type: object
          properties:
            value:
              description: Day of week used for matching
              type: number
              minimum: 1
              maximum: 7
    BaseRuleWithHourOfDayValue:
      allOf:
        - $ref: '#/components/schemas/BaseRule'
        - type: object
          properties:
            value:
              description: Hour of day used for matching
              type: number
              minimum: 0
              maximum: 24
    BaseRuleWithMinuteOfHourValue:
      allOf:
        - $ref: '#/components/schemas/BaseRule'
        - type: object
          properties:
            value:
              description: Minute of hour used for matching
              type: number
              minimum: 1
              maximum: 60
    BaseRuleWithBrowserNameValue:
      allOf:
        - $ref: '#/components/schemas/BaseRule'
        - type: object
          properties:
            value:
              description: Browser name used for matching
              type: string
              enum:
                - chrome
                - microsoft_ie
                - firefox
                - microsoft_edge
                - mozilla
                - opera
                - safari
    BaseRuleWithOsValue:
      allOf:
        - $ref: '#/components/schemas/BaseRule'
        - type: object
          properties:
            value:
              description: Operating System name used for matching
              type: string
              enum:
                - android
                - iphone
                - ipod
                - ipad
                - windows
                - macos
                - linux
    BaseRuleWithWeatherConditionValue:
      allOf:
        - $ref: '#/components/schemas/BaseRule'
        - type: object
          properties:
            value:
              description: >
                Weather Condition name used for matching. Full or partial
                condition.


                The weather provider used by Convert detects the following
                conditions:

                - Blizzard

                - Blowing snow

                - Cloudy

                - Fog

                - Freezing drizzle

                - Freezing fog

                - Heavy freezing drizzle

                - Heavy rain

                - Heavy rain at times

                - Light drizzle

                - Light freezing rain

                - Light rain

                - Mist

                - Moderate rain

                - Moderate rain at times

                - Overcast

                - Partly cloudy
              type: string
    WeatherConditions:
      description: Standardized weather condition strings used for targeting.
      type: string
      enum:
        - Blizzard
        - Blowing snow
        - Cloudy
        - Fog
        - Freezing drizzle
        - Freezing fog
        - Heavy freezing drizzle
        - Heavy rain
        - Heavy rain at times
        - Light drizzle
        - Light freezing rain
        - Light rain
        - Mist
        - Moderate rain
        - Moderate rain at times
        - Overcast
        - Partly cloudy
        - Patchy freezing drizzle possible
        - Patchy light drizzle
        - Patchy light rain
        - Patchy rain possible
        - Patchy sleet possible
        - Patchy snow possible
        - Sunny
        - Thundery outbreaks possible
    BaseMatch:
      type: object
      properties:
        negated:
          description: >
            If `true`, the logical result of the match is inverted.

            For example, if `match_type` is 'contains' and `value` is 'apple',
            `negated: true` means the rule matches if the attribute *does not*
            contain 'apple'.
          type: boolean
    TextMatchRulesTypes:
      type: string
      enum:
        - url
        - url_with_query
        - query_string
        - campaign
        - keyword
        - medium
        - source_name
        - city
        - region
        - browser_version
        - user_agent
        - page_tag_page_type
        - page_tag_category_id
        - page_tag_category_name
        - page_tag_product_sku
        - page_tag_product_name
        - page_tag_customer_id
        - page_tag_custom_1
        - page_tag_custom_2
        - page_tag_custom_3
        - page_tag_custom_4
        - visitor_id
    NumericMatchRulesTypes:
      type: string
      enum:
        - avg_time_page
        - days_since_last_visit
        - pages_visited_count
        - visit_duration
        - visits_count
        - page_tag_product_price
    BoolMatchRulesTypes:
      type: string
      enum:
        - bucketed_into_experience
        - is_desktop
        - is_mobile
        - is_tablet
    GenericTextKeyValueMatchRulesTypes:
      type: string
      enum:
        - generic_text_key_value
    GenericNumericKeyValueMatchRulesTypes:
      type: string
      enum:
        - generic_numeric_key_value
    GenericBoolKeyValueMatchRulesTypes:
      type: string
      enum:
        - generic_bool_key_value
    VisitorDataExistsMatchRulesTypes:
      type: string
      enum:
        - visitor_data_exists
    JsConditionMatchRulesTypes:
      type: string
      enum:
        - js_condition
    KeyValueMatchRulesTypes:
      allOf:
        - $ref: '#/components/schemas/GenericTextKeyValueMatchRulesTypes'
        - $ref: '#/components/schemas/GenericNumericKeyValueMatchRulesTypes'
        - $ref: '#/components/schemas/GenericBoolKeyValueMatchRulesTypes'
    CookieMatchRulesTypes:
      type: string
      enum:
        - cookie
    CountryMatchRulesTypes:
      type: string
      enum:
        - country
    VisitorTypeMatchRulesTypes:
      type: string
      enum:
        - visitor_type
    LanguageMatchRulesTypes:
      type: string
      enum:
        - language
    GoalTriggeredMatchRulesTypes:
      type: string
      enum:
        - goal_triggered
    SegmentBucketedMatchRulesTypes:
      type: string
      enum:
        - bucketed_into_segment
    DayOfWeekMatchRulesTypes:
      type: string
      enum:
        - local_time_day_of_week
        - project_time_day_of_week
    HourOfDayMatchRulesTypes:
      type: string
      enum:
        - local_time_hour_of_day
        - project_time_hour_of_day
    MinuteOfHourMatchRulesTypes:
      type: string
      enum:
        - local_time_minute_of_hour
        - project_time_minute_of_hour
    BrowserNameMatchRulesTypes:
      type: string
      enum:
        - browser_name
    OsMatchRulesTypes:
      type: string
      enum:
        - os
    WeatherConditionMatchRulesTypes:
      type: string
      enum:
        - weather_condition
    RulesTypes:
      allOf:
        - $ref: '#/components/schemas/TextMatchRulesTypes'
        - $ref: '#/components/schemas/NumericMatchRulesTypes'
        - $ref: '#/components/schemas/BoolMatchRulesTypes'
        - $ref: '#/components/schemas/KeyValueMatchRulesTypes'
        - $ref: '#/components/schemas/VisitorDataExistsMatchRulesTypes'
        - $ref: '#/components/schemas/CookieMatchRulesTypes'
        - $ref: '#/components/schemas/CountryMatchRulesTypes'
        - $ref: '#/components/schemas/VisitorTypeMatchRulesTypes'
        - $ref: '#/components/schemas/LanguageMatchRulesTypes'
        - $ref: '#/components/schemas/GoalTriggeredMatchRulesTypes'
        - $ref: '#/components/schemas/SegmentBucketedMatchRulesTypes'
        - $ref: '#/components/schemas/DayOfWeekMatchRulesTypes'
        - $ref: '#/components/schemas/HourOfDayMatchRulesTypes'
        - $ref: '#/components/schemas/MinuteOfHourMatchRulesTypes'
        - $ref: '#/components/schemas/BrowserNameMatchRulesTypes'
        - $ref: '#/components/schemas/OsMatchRulesTypes'
        - $ref: '#/components/schemas/WeatherConditionMatchRulesTypes'
    GenericTextMatchRule:
      allOf:
