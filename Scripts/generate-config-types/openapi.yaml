    LocationTrigger:
      description: >
        Defines how and when an experience associated with this location should
        be activated for a visitor who matches the location's rules.

        The `type` determines the activation mechanism.

        Knowledge Base: "Locations" - "Dynamic Website Triggers".
      oneOf:
        - $ref: '#/components/schemas/LocationTriggerDomElement'
        - $ref: '#/components/schemas/LocationTriggerCallback'
        - $ref: '#/components/schemas/LocationTriggerManual'
        - $ref: '#/components/schemas/LocationTriggerUponRun'
      discriminator:
        propertyName: type
        mapping:
          dom_element: '#/components/schemas/LocationTriggerDomElement'
          callback: '#/components/schemas/LocationTriggerCallback'
          manual: '#/components/schemas/LocationTriggerManual'
          upon_run: '#/components/schemas/LocationTriggerUponRun'
    LocationTriggerTypes:
      type: string
      default: upon_run
      description: >
        Specifies the mechanism that activates an experience when its location
        rules are met:

        - `upon_run`: (Default) The experience activates as soon as the Convert
        tracking script loads and evaluates that the visitor matches the
        location's rules (e.g., URL match). This is the standard behavior for
        most A/B tests.

        - `manual`: The experience only activates when explicitly triggered by a
        JavaScript call (`window._conv_q.push({ what: 'triggerLocation', params:
        { locationId: '...' } })`). Gives precise programmatic control over
        activation.

        - `dom_element`: The experience activates upon a specific user
        interaction (e.g., 'click', 'hover', 'in_view', 'change') with a defined
        DOM element (identified by a CSS `selector`). Useful for testing changes
        related to interactive elements.

        - `callback`: The experience activates when a custom JavaScript
        `callback` function (provided in `js`) calls the `activate()` function
        passed to it. Allows for complex asynchronous activation logic, e.g.,
        after an API response or a specific SPA state change.

        Note: For Full Stack projects, `upon_run` is effectively the only mode,
        as activation is handled by the SDK.
      enum:
        - upon_run
        - manual
        - dom_element
        - callback
    LocationTriggerBase:
      type: object
      properties:
        type:
          $ref: '#/components/schemas/LocationTriggerTypes'
      required:
        - type
    LocationTriggerUponRun:
      allOf:
        - $ref: '#/components/schemas/LocationTriggerBase'
        - type: object
          properties:
            type:
              type: string
              enum:
                - upon_run
          additionalProperties: false
    LocationTriggerManual:
      allOf:
        - $ref: '#/components/schemas/LocationTriggerBase'
        - type: object
          properties:
            type:
              type: string
              enum:
                - manual
          additionalProperties: false
    LocationDomTriggerEvents:
      type: string
      description: >
        The type of user interaction with a DOM element that will trigger the
        experience:

        - `click`: Activates when the element is clicked.

        - `hover`: Activates when the mouse pointer hovers over the element
        (mouseenter).

        - `in_view`: Activates when the element becomes visible in the browser's
        viewport (e.g., user scrolls to it). KB: "Launch Experiments Using
        Custom JavaScript When Elements Appear in DOM".

        - `change`: Activates when the value of a form element (like input,
        select, textarea) changes.
      enum:
        - click
        - hover
        - in_view
        - change
    LocationTriggerDomElement:
      allOf:
        - $ref: '#/components/schemas/LocationTriggerBase'
        - type: object
          properties:
            type:
              type: string
              enum:
                - dom_element
            selector:
              description: Describes html selector
              type: string
            events:
              type: array
              description: Events for LocationTriggerDomElement
              items:
                $ref: '#/components/schemas/LocationDomTriggerEvents'
          additionalProperties: false
          required:
            - selector
            - events
    LocationTriggerCallback:
      allOf:
        - $ref: '#/components/schemas/LocationTriggerBase'
        - type: object
          properties:
            type:
              type: string
              enum:
                - callback
            js:
              type: string
              description: >
                Describes the js callback that will be executed in order to fire
                the experience.


                It is called with two arguments:

                - `activate` - a function that should be called when the
                experience should be activated

                - `options` - an object with the following properties:
                  - `locationId` - id of the location that is being activated
                  - `isActive` - boolean flag that indicates if the location is active
                Example:

                ```

                function(activate, options) {
                  if (options.isActive) {
                    setTimeout(function() {
                      /* it activates the experiences 1 second after the
                      location trigger is initialized - at the load of the tracking script */
                      activate();
                    }, 1000);
                  }
                }

                ```
          additionalProperties: false
          required:
            - js
    ConfigLocation:
      description: Base Location object
      type: object
      properties:
        id:
          type: string
          description: Location ID
        key:
          description: Location unique key
          type: string
        name:
          type: string
          description: Location Name
        trigger:
          $ref: '#/components/schemas/LocationTrigger'
        rules:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/RuleObject'
    ConfigProjectMinimalSettings:
      type: object
      properties:
        include_jquery:
          type: boolean
          description: >-
            Whether to include jQuery library or not into the javascript
            tracking file served by Convert and loaded via the tracking snippet.
            If jQuery is not included, it has to be loaded on page, before
            Convert's tracking code
        include_jquery_v1:
          type: boolean
          default: false
          description: >-
            Whether to include jQuery library or not into the v1 javascript
            tracking file served by Convert and loaded via the tracking snippet.
        disable_spa_functionality:
          type: boolean
          default: false
          description: >-
            Whether to disable the SPA (Single Page Application) related
            functionalities from the tracking scripts V1. Most websites work
            fine without disabling SPA functionality regardless of the fact they
            are Single Page Apps or not. In edge situation, this setting might
            prove handy
        version:
          type: string
          maxLength: 50
          nullable: true
          readOnly: true
          description: >
            Tracks the project's version, updated with each change done inside
            the project, which would affect the config of that project. The
            format is [ISO_datetime]-[incremental_number].
        tracking_script:
          $ref: '#/components/schemas/TrackingScriptReleaseBase'
    ConfigProject:
      type: object
      description: Project Object under which experiences would get created
      properties:
        id:
          description: Project ID
          type: string
        name:
          description: >-
            Project Name. If **settings.data_anonymization** is turned on, the
            name will be generated from **id** field
          type: string
        type:
          type: string
          description: Value which describes project product type
          enum:
            - fullstack
            - web
        utc_offset:
          $ref: '#/components/schemas/UTC_Offset'
        custom_domain:
          type: object
          nullable: true
          description: >
            Object representing the custom domain that is used for loading the
            tracking scripts and

            sending tracking requests to Convert servers instead of the standard
            Convert domain
          properties:
            domain:
              type: string
              description: Custom domain to be used instead of standard Convert's one
              maxLength: 150
              pattern: ^.+\..+
            version:
              type: string
              description: The version of the custom domain.
              readOnly: true
        domains:
          description: List of domains allowed to be tracked under this project
          type: array
          items:
            type: object
            properties:
              tld:
                description: 'Top level domain, used for setting cookies where applicable'
                type: string
              hosts:
                description: >-
                  List of host names under **tld** which are allowed to be
                  tracked under this project
        global_javascript:
          type: string
          nullable: true
          description: >
            The global javascript code that will be loaded on all pages where

            the tracking script is installed, prior to processing any of

            experiences, goals, audiences etc. When an environment is specified
            in the request,

            this will be combined with the environment-specific global_js (if
            any) by appending

            the environment's code with a newline character.
        settings:
          allOf:
            - description: Various project's settings
              type: object
              properties:
                allow_crossdomain_tracking:
                  description: >
                    Flag indicating whether decoration of outgoing links
                    (appending tracking cookies inside the link URL in order to 

                    make cross domain tracking possible) is done automatically
                    on page
                  type: boolean
                data_anonymization:
                  description: >-
                    Whether or not data is
                    [anonymized](https://convert.zendesk.com/hc/en-us/articles/204506339-Prevent-Experiment-Details-Data-Leak-with-Data-Anonymization).
                  type: boolean
                do_not_track:
                  description: >-
                    Follow the 'Do not track' browser settings for users in the
                    mentioned area of the world.
                  type: string
                  enum:
                    - 'OFF'
                    - EU ONLY
                    - EEA ONLY
                    - Worldwide
                global_privacy_control:
                  type: string
                  enum:
                    - 'OFF'
                    - EU ONLY
                    - EEA ONLY
                    - Worldwide
                  description: >
                    Follow Global Privacy Control (GPC) signals for users in the
                    mentioned area of the world.

                    - OFF: Do not follow GPC signals.

                    - EU ONLY: Follow GPC signals for users in the European
                    Union only.

                    - EEA ONLY: Follow GPC signals for users in the European
                    Economic Area only.

                    - Worldwide: Follow GPC signals for users worldwide.
                do_not_track_referral:
                  type: boolean
                  default: false
                  description: >-
                    When this is turned to true, Convert won't track any
                    referral data like http referral, utm query strings etc.
                    Those will be used on the current page if available but
                    won't be stored in cookies in order to be used on subsequent
                    pages.
                integrations:
                  description: This holds project wide settings used by integrations
                  type: object
                  properties:
                    google_analytics:
                      $ref: '#/components/schemas/GA_Settings'
                    visitor_insights:
                      type: object
                      properties:
                        tracking_id:
                          $ref: '#/components/schemas/VisitorInsightsTrackingId'
                    kissmetrics:
                      type: object
                      properties:
                        enabled:
                          type: boolean
                          description: >-
                            Flag indicating whether Kissmetrics integration is
                            enabled or not for this project
                min_order_value:
                  description: Minimum order value for transactions outliers
                  type: number
                  minimum: 0
                  deprecated: true
                max_order_value:
                  description: Maximum order value for transactions outliers
                  type: number
                  minimum: 0
                  deprecated: true
                outliers:
                  description: Various settings used by the stats engine to detect outliers
                  type: object
                  properties:
                    order_value:
                      description: Order value outlier settings
                      allOf:
                        - $ref: '#/components/schemas/NumericOutlier'
                    products_ordered_count:
                      description: Products Ordered count outlier settings
                      allOf:
                        - $ref: '#/components/schemas/NumericOutlier'
                placeholders:
                  type: array
                  description: >-
                    List of active placeholders which are used in experiences
                    for the project
                  items:
                    type: string
                    description: Placeholder key
                  example:
                    - placeholder-1
                    - placeholder-2
                global_javascript_placeholders:
                  type: array
                  description: >-
                    List of placeholders used in project's Global JavaScript
                    (convertPlaceholders.<key>)
                  items:
                    type: string
                    description: Placeholder key
                  example:
                    - first_name
                    - email
            - $ref: '#/components/schemas/ConfigProjectMinimalSettings'
    TrackingScriptReleaseBase:
      type: object
      nullable: true
      description: >-
        Settings to identify which tracking script version will be applied to
        the project.
      properties:
        current_version:
          type: string
          description: Current version of the tracking script bundle
          readOnly: true
        latest_version:
          type: string
          description: Latest available version of the tracking script bundle.
          nullable: true
          readOnly: true
    VisitorInsightsTrackingId:
      type: string
      description: The tracking ID for Visitor Insights.
      readOnly: true
    VisitorInsightsData:
      allOf:
        - $ref: '#/components/schemas/VisitorInsightsBase'
        - type: object
          readOnly: true
          properties:
            tracking_id:
              $ref: '#/components/schemas/VisitorInsightsTrackingId'
            sampling_rate:
              type: number
              description: The sampling rate for tracking events.
              minimum: 0
              maximum: 100
              default: 5
    ProjectGASettingsBase:
      allOf:
        - $ref: '#/components/schemas/GA_SettingsBase'
        - type: object
          properties:
            auto_revenue_tracking:
              type: boolean
              description: >-
                Attempt to pull revenue data from Google Analytics Revenue
                Tracking code.
            track_first_exposure_only:
              type: boolean
              default: false
              description: >-
                When enabled, the experience_impression event is sent only the
                first time a visitor is exposed to an experience, instead of on
                every subsequent qualifying page view. Opt-in and disabled by
                default.
    ProjectIntegrationGA3:
      allOf:
        - $ref: '#/components/schemas/ProjectGASettingsBase'
        - $ref: '#/components/schemas/IntegrationGA3'
    ProjectIntegrationGA4:
      allOf:
        - $ref: '#/components/schemas/ProjectGASettingsBase'
        - $ref: '#/components/schemas/IntegrationGA4Base'
        - type: object
          properties:
            no_wait_pageview:
              type: boolean
              description: >-
                Boolean indicating whether to wait for the page view event to
                complete before sending other events.
    GA_Settings:
      oneOf:
        - $ref: '#/components/schemas/ProjectIntegrationGA3'
        - $ref: '#/components/schemas/ProjectIntegrationGA4'
      discriminator:
        propertyName: type
        mapping:
          ga3: '#/components/schemas/ProjectIntegrationGA3'
          ga4: '#/components/schemas/ProjectIntegrationGA4'
    ConfigSegment:
      description: Base Segment object
      type: object
      properties:
        id:
          type: string
          description: Segment ID
        key:
          description: Segment unique key
          type: string
        name:
          type: string
          description: Segment Name
        rules:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/RuleObject'
    SendTrackingEventsRequestData:
      type: object
      description: Tracking Request's data
      required:
        - visitorId
        - events
      properties:
        accountId:
          description: ID of the account under which the project is setup
          type: string
        projectId:
          description: ID of the project under which the tracking occurs
          type: string
        enrichData:
          description: >
            Flag to determine whether the data is gonna be enriched before the
            events are stored for reporting.

            For example, in case of a conversion event, if this flag is on and
            bucketing is not provided, the bucketing stored on the backend
            datastore for the given visitor

            ID would be used. Same applies for segments. 


            *Note*: this flag is only available for some plans
          type: boolean
        visitors:
          description: |
            List of visitors tracked. Each visitor can have multiple events. 
          type: array
          items:
            type: object
            properties:
              segments:
                $ref: '#/components/schemas/VisitorSegments'
              visitorId:
                type: string
                description: Id of the visitor tracked
              events:
                type: array
                description: List of events fired for the given visitor
                items:
                  $ref: '#/components/schemas/VisitorTrackingEvents'
    VisitorTrackingEvents:
      type: object
      description: Tracking events related to the same user ID
      properties:
        eventType:
          description: Type of the event. It can be a bucketing or a conversion event
          type: string
          enum:
            - bucketing
            - conversion
        data:
          oneOf:
            - $ref: '#/components/schemas/BucketingEvent'
            - $ref: '#/components/schemas/ConversionEvent'
    BucketingEvent:
      description: Bucketing event data
      type: object
      properties:
        experienceId:
          description: >
            Experience ID to which the visitor is bucketed. In case that
            **enrichData=true** flag is being sent, only unique events are gonna
            be recorded. Otherwise, it's 

            up to the client to ensure that duplicates of the same event for the
            same visitor do not get sent to the tracking endpoint.
          type: string
        variationId:
          description: >-
            Variation ID corresponding to the experience identified by
            experienceID, that is assigned to the visitor.
          type: string
      required:
        - experienceId
        - variationId
    ConversionEvent:
      description: Conversion event data
      type: object
      required:
        - goalId
      properties:
        goalId:
          description: Id of the conversion goal to be fired
          type: string
        goalData:
          description: >-
            Data connected to this conversion, for non binomial metrics, eg
            revenue
          type: array
          items:
            type: object
            properties:
              key:
                description: Key of the metric
                type: string
                enum:
                  - amount
                  - productsCount
                  - transactionId
                  - customDimension1
                  - customDimension2
                  - customDimension3
                  - customDimension4
                  - customDimension5
              value:
                description: Value of the metric
                oneOf:
                  - type: number
                  - type: string
                  - type: array
                    items:
                      type: string
                      description: >
                        Array of strings, each string accepts a max of 32
                        characters. Can only be used for the following keys: -
                        customDimension1 - customDimension2 - customDimension3 -
                        customDimension4 - customDimension5
        bucketingData:
          type: object
          additionalProperties:
            type: string
            description: Experience ID is the key and variation ID is the value
          description: >
            Bucketing data (experiences that this visitor is currently part of)
            for the visitor. In case that **enrichData=true** flag is being sent
            and 

            this attribute is not provided, the bucketing stored on the backend
            datastore for the given visitor is gonna be used. If both
            **enrichData=true** and 

            **bucketingData**, the **bucketingData** is gonna be merged with the
            stored data inside the backend data source, the request provided
            data having the 

            biggest overwriting bucketing for the same experience which might
            exist on the backend
    VisitorSegments:
      description: >
        Segments under which this visitor is placed. Some defaults keys are
        accepted and any other free field **key value** could be used

        for fullstack projects
      type: object
      properties:
        browser:
          description: |
            Browser used:
              IE - Internet Explorer
              CH - Chrome
              FF - Firefox
              OP - Opera
              SF - Safari
              OTH - Other
          type: string
          enum:
            - IE
            - CH
            - FF
            - OP
            - SF
            - OTH
        devices:
          description: List of device classes that the visitor device falls into
          type: array
          items:
            type: string
            description: >
              ALLPH - All Phones IPH - IPhone OTHPH - Other Phones ALLTAB - All
              Tablets IPAD - IPad OTHTAB - Other Tablets DESK - Desktop OTHDEV -
              Other Devices
            enum:
              - ALLPH
              - IPH
              - OTHPH
              - ALLTAB
              - IPAD
              - OTHTAB
              - DESK
              - OTHDEV
        source:
          description: Traffic source
          type: string
          enum:
            - campaign
            - search
            - referral
            - direct
            - ai_tool
        campaign:
          description: Campaign string
          type: string
        visitorType:
          description: Type of the visitor
          type: string
          enum:
            - new
            - returning
        country:
          description: Two ISO country code for visitor's country
          type: string
          minLength: 2
          maxLength: 2
        customSegments:
          description: >-
