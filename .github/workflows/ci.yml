name: CI
on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
permissions: read-all
jobs:
  build-test:
    name: Build, Lint & Test
    runs-on: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
      - name: Install SwiftLint
        # macos-26 images do not ship SwiftLint (verified against actions/runner-images
        # macos-26-arm64 manifest 2026-06-11) — install explicitly; never a package dependency (NFR16)
        run: brew install swiftlint
      - name: SwiftLint (zero-warnings)
        run: swiftlint lint --strict --reporter github-actions-logging
      - name: Resolve package graph
        run: swift package resolve
      - name: Build
        run: swift build
      - name: Import Guard — ConvertSDKCore Foundation-only
        run: |
          if grep -rE '^[[:space:]]*import[[:space:]]+(UIKit|AppKit|Security|BackgroundTasks|WatchKit)' Sources/ConvertSDKCore/ --include='*.swift'; then
            echo "::error::forbidden framework import found in ConvertSDKCore (must be Foundation-only per AR3)"
            exit 1
          fi
          echo "Import guard passed — ConvertSDKCore is Foundation-only."
      - name: Compile against iOS 15 floor (ConvertSDKCore — pure logic, compile-only)
        run: xcodebuild build -scheme ConvertSDK -destination 'generic/platform=iOS Simulator' -quiet
      - name: Test + Coverage (all targets, latest iOS simulator)
        # Device names vary per runner image (macos-26 ships iPhone 16e/17/Air — no plain
        # "iPhone 16"); resolve the first available iPhone simulator dynamically instead
        # of hardcoding a name that can vanish on the next image rev.
        run: |
          DEVICE=$(xcrun simctl list devices available | grep -E '^[[:space:]]+iPhone' | head -1 | sed -E 's/^[[:space:]]+//; s/ \([0-9A-F-]+\).*$//')
          echo "Resolved simulator device: ${DEVICE}"
          xcodebuild test -scheme ConvertSDK -destination "platform=iOS Simulator,name=${DEVICE}" -enableCodeCoverage YES -resultBundlePath TestResults.xcresult -quiet
      - name: Coverage gates (core >=85% / platform >=70%) — NON-BLOCKING until Story 5.5
        continue-on-error: true   # TODO(story-5-5): harden to blocking gate
        run: |
          if ! python3 Scripts/check-coverage.py --result TestResults.xcresult --core-label ConvertSDKCore --core-min 85 --platform-target ConvertSDK --platform-min 70; then
            echo "::warning::Coverage gate not yet met (core>=85%/platform>=70%). Non-blocking until Story 5.5 hardens it to a blocking gate."
          fi
  parity-suite:
    name: Parity Suite (100%-pass independent job)
    runs-on: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
      - name: Run MurmurHash3 Parity Suite (Cross-SDK Gate)
        # 100%-pass independent job — "fix the Swift side, never the vectors."
        # Kept separate from build-test so it reports independently and does NOT
        # count toward the coverage gate. Vectors are committed artifacts; this job
        # never regenerates them.
        run: swift test --filter HashParityTests
